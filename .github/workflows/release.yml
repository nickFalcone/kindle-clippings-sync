name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            # The community-plugin directory requires the release tag to be
            # exactly the manifest version (no "v" prefix).
            - name: Verify tag matches manifest version
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  version="$(jq -r .version manifest.json)"
                  if [ "$tag" != "$version" ]; then
                      echo "Tag '$tag' does not match manifest.json version '$version'" >&2
                      exit 1
                  fi

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              # Attestations are unavailable on user-owned private repos —
              # skip there so pre-publication test releases still work.
              if: ${{ !github.event.repository.private }}
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
